<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>论文搜索</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="bg-gradient-to-b from-slate-50 to-slate-100 min-h-screen">
    <!-- Header -->
    <header class="border-b bg-white/95 backdrop-blur sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4">
            <div class="flex items-center gap-3">
                <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                </svg>
                <h1 class="text-2xl font-bold text-slate-800">论文搜索</h1>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <!-- Search Section -->
        <div class="max-w-3xl mx-auto mb-8">
            <div class="text-center mb-6">
                <h2 class="text-3xl font-bold text-slate-800 mb-2">发现学术论文与研究</h2>
                <p class="text-slate-500">输入关键词，搜索来自 arXiv、Google Scholar 等平台的学术论文</p>
            </div>

            <!-- Search Input -->
            <div class="flex gap-3">
                <input
                    type="text"
                    id="searchInput"
                    placeholder="输入论文关键词，如：machine learning、deep neural network..."
                    class="flex-1 h-12 px-4 text-base border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                >
                <button
                    id="searchBtn"
                    onclick="handleSearch()"
                    class="h-12 px-6 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors flex items-center gap-2 disabled:bg-blue-400 disabled:cursor-not-allowed"
                >
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                    <span id="btnText">搜索</span>
                </button>
            </div>

            <!-- Quick Tags -->
            <div class="flex flex-wrap gap-2 mt-4 justify-center">
                <button onclick="setQuickTag('artificial intelligence')" class="px-3 py-1 bg-slate-100 text-slate-600 rounded-full text-sm hover:bg-slate-200 transition-colors">人工智能</button>
                <button onclick="setQuickTag('machine learning')" class="px-3 py-1 bg-slate-100 text-slate-600 rounded-full text-sm hover:bg-slate-200 transition-colors">机器学习</button>
                <button onclick="setQuickTag('natural language processing')" class="px-3 py-1 bg-slate-100 text-slate-600 rounded-full text-sm hover:bg-slate-200 transition-colors">自然语言处理</button>
                <button onclick="setQuickTag('computer vision')" class="px-3 py-1 bg-slate-100 text-slate-600 rounded-full text-sm hover:bg-slate-200 transition-colors">计算机视觉</button>
            </div>
        </div>

        <!-- Error Display -->
        <div id="errorDisplay" class="hidden max-w-3xl mx-auto mb-6">
            <div class="border border-red-200 bg-red-50 rounded-lg p-4 flex items-center gap-3">
                <svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <p id="errorText" class="text-red-600"></p>
            </div>
        </div>

        <!-- Loading Skeleton -->
        <div id="loadingSkeleton" class="hidden max-w-3xl mx-auto space-y-4">
            <div class="h-24 bg-slate-200 rounded-lg animate-pulse"></div>
            <div class="h-32 bg-slate-200 rounded-lg animate-pulse"></div>
            <div class="h-32 bg-slate-200 rounded-lg animate-pulse"></div>
        </div>

        <!-- Results Container -->
        <div id="resultsContainer" class="hidden max-w-3xl mx-auto space-y-6">
            <!-- AI Summary -->
            <div id="aiSummary" class="hidden border border-blue-200 bg-blue-50 rounded-lg p-4">
                <h3 class="text-lg font-semibold text-slate-800 flex items-center gap-2 mb-2">
                    <svg class="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"></path>
                    </svg>
                    AI 摘要
                </h3>
                <p id="summaryText" class="text-sm text-slate-700 leading-relaxed"></p>
            </div>

            <!-- Results Count -->
            <p class="text-slate-500">
                找到 <span id="totalCount" class="font-semibold text-slate-800">0</span> 条相关结果
            </p>

            <!-- Results List -->
            <div id="resultsList" class="space-y-4"></div>
        </div>

        <!-- Initial State -->
        <div id="initialState" class="max-w-3xl mx-auto">
            <div class="border-2 border-dashed border-slate-200 rounded-lg p-16 flex flex-col items-center justify-center">
                <svg class="w-16 h-16 text-slate-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                </svg>
                <p class="text-slate-500 text-lg mb-2">开始搜索学术论文</p>
                <p class="text-sm text-slate-400">输入关键词，发现来自世界顶级学术平台的研究论文</p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t mt-16">
        <div class="max-w-6xl mx-auto px-4 py-6">
            <p class="text-center text-sm text-slate-500">
                搜索来源：arXiv · Google Scholar · ResearchGate · Semantic Scholar · ACM · IEEE
            </p>
        </div>
    </footer>

    <script>
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const btnText = document.getElementById('btnText');
        const errorDisplay = document.getElementById('errorDisplay');
        const errorText = document.getElementById('errorText');
        const loadingSkeleton = document.getElementById('loadingSkeleton');
        const resultsContainer = document.getElementById('resultsContainer');
        const aiSummary = document.getElementById('aiSummary');
        const summaryText = document.getElementById('summaryText');
        const totalCount = document.getElementById('totalCount');
        const resultsList = document.getElementById('resultsList');
        const initialState = document.getElementById('initialState');

        let isLoading = false;

        function setQuickTag(tag) {
            searchInput.value = tag;
            handleSearch();
        }

        function showError(message) {
            errorDisplay.classList.remove('hidden');
            errorText.textContent = message;
        }

        function hideError() {
            errorDisplay.classList.add('hidden');
        }

        function setLoading(loading) {
            isLoading = loading;
            searchBtn.disabled = loading;

            if (loading) {
                btnText.innerHTML = '<div class="flex items-center gap-2"><div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>搜索中</div>';
            } else {
                btnText.textContent = '搜索';
            }
        }

        async function handleSearch() {
            const query = searchInput.value.trim();
            if (!query || isLoading) return;

            setLoading(true);
            hideError();
            initialState.classList.add('hidden');
            resultsContainer.classList.add('hidden');
            loadingSkeleton.classList.remove('hidden');

            try {
                const response = await fetch('/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query, count: 15 })
                });

                const data = await response.json();
                loadingSkeleton.classList.add('hidden');

                if (data.success) {
                    renderResults(data);
                } else {
                    showError(data.error || '搜索失败');
                }
            } catch (err) {
                loadingSkeleton.classList.add('hidden');
                showError('网络错误，请稍后重试');
            } finally {
                setLoading(false);
            }
        }

        function renderResults(data) {
            if (data.summary) {
                aiSummary.classList.remove('hidden');
                summaryText.textContent = data.summary;
            } else {
                aiSummary.classList.add('hidden');
            }

            totalCount.textContent = data.total;

            if (data.results.length > 0) {
                resultsList.innerHTML = data.results.map(item => `
                    <div class="bg-white rounded-lg shadow-sm hover:shadow-md transition-shadow p-6">
                        <div class="flex items-start justify-between gap-4">
                            <div class="flex-1 space-y-2">
                                <a href="${item.url}" target="_blank" rel="noopener noreferrer"
                                   class="text-lg font-semibold text-slate-800 hover:text-blue-600 transition-colors line-clamp-2">
                                    ${escapeHtml(item.title)}
                                </a>

                                <div class="flex flex-wrap items-center gap-3 text-sm text-slate-500">
                                    ${item.siteName ? '<span class="px-2 py-0.5 border border-slate-200 rounded text-xs">' + escapeHtml(item.siteName) + '</span>' : ''}
                                    ${item.publishTime ? '<div class="flex items-center gap-1"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>' + item.publishTime + '</div>' : ''}
                                    ${item.authorityLevel > 0 && item.authorityDesc ? '<div class="flex items-center gap-1 text-amber-600"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"></path></svg>' + item.authorityDesc + '</div>' : ''}
                                </div>

                                <p class="text-sm text-slate-500 line-clamp-3">${escapeHtml(item.snippet)}</p>

                                ${item.summary ? '<div class="mt-3 p-3 bg-slate-50 rounded-lg"><p class="text-sm text-slate-700 line-clamp-2"><span class="font-medium">AI 摘要：</span>' + escapeHtml(item.summary) + '</p></div>' : ''}
                            </div>

                            <a href="${item.url}" target="_blank" rel="noopener noreferrer" class="flex-shrink-0 p-2 hover:bg-slate-100 rounded-lg transition-colors">
                                <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
                                </svg>
                            </a>
                        </div>
                    </div>
                `).join('');
            } else {
                resultsList.innerHTML = '<div class="bg-white rounded-lg p-12 flex flex-col items-center justify-center"><p class="text-slate-500">未找到相关论文，请尝试其他关键词</p></div>';
            }

            resultsContainer.classList.remove('hidden');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSearch();
        });
    </script>
</body>
</html>
